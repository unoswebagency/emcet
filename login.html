<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — EAPCET 2026 Study Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F9FAFB; --card: #FFFFFF; --border: #E5E7EB;
    --text: #111827; --text2: #6B7280; --text3: #9CA3AF;
    --accent: #4F46E5; --accent2: #6366F1;
    --math: #D97706; --chem: #16A34A; --danger: #DC2626;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .container {
    width:100%; max-width:400px;
  }

  .brand {
    text-align:center;
    margin-bottom:1.75rem;
  }
  .brand-logo {
    font-size:1.6rem; font-weight:800;
    letter-spacing:-0.5px; color:var(--text);
  }
  .brand-badge {
    display:inline-block;
    background: var(--accent);
    color:#fff; font-size:0.6rem; font-weight:700;
    padding:2px 7px; border-radius:99px;
    letter-spacing:1px; text-transform:uppercase;
    margin-left:6px; vertical-align:middle;
  }
  .brand-sub { font-size:0.85rem; color:var(--text2); margin-top:5px; }

  .card {
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:1.75rem;
    box-shadow:0 1px 4px rgba(0,0,0,.07);
  }

  .tabs {
    display:flex;
    background:#F3F4F6;
    border-radius:9px;
    padding:3px;
    gap:3px;
    margin-bottom:1.5rem;
  }
  .tab-btn {
    flex:1; padding:8px; border-radius:7px;
    border:none; background:none;
    color:var(--text2); font-family:inherit;
    font-size:0.85rem; font-weight:600; cursor:pointer;
    transition:all .15s;
  }
  .tab-btn.active { background:var(--accent); color:#fff; }

  .form-group { margin-bottom:.9rem; }
  label { display:block; font-size:0.76rem; font-weight:600; color:var(--text2); margin-bottom:5px; }
  input {
    width:100%;
    padding:10px 13px;
    background:#fff;
    border:1.5px solid var(--border);
    border-radius:9px;
    color:var(--text);
    font-size:0.88rem;
    font-family:inherit;
    outline:none;
    transition:border .15s;
  }
  input:focus { border-color:var(--accent); }
  input::placeholder { color:var(--text3); }

  .btn {
    width:100%; padding:11px;
    background:var(--accent);
    color:#fff;
    border:none; border-radius:9px;
    font-family:inherit;
    font-size:0.88rem; font-weight:700;
    cursor:pointer; transition:opacity .15s;
    margin-top:0.5rem;
  }
  .btn:hover { opacity:.88; }
  .btn:disabled { opacity:.5; cursor:not-allowed; }

  .error-msg {
    background:rgba(220,38,38,.07);
    border:1px solid rgba(220,38,38,.2);
    color:var(--danger);
    padding:9px 13px;
    border-radius:8px;
    font-size:0.8rem;
    margin-bottom:.9rem;
    display:none;
  }
  .success-msg {
    background:rgba(22,163,74,.07);
    border:1px solid rgba(22,163,74,.2);
    color:#16A34A;
    padding:9px 13px;
    border-radius:8px;
    font-size:0.8rem;
    margin-bottom:.9rem;
    display:none;
  }

  .divider { border:none; border-top:1px solid var(--border); margin:1.1rem 0; }

  .info-pills {
    display:flex; gap:7px; flex-wrap:wrap; justify-content:center;
    margin-top:1.25rem;
  }
  .pill {
    font-size:0.72rem; font-weight:600; padding:3px 11px;
    border-radius:99px; border:1px solid var(--border);
    color:var(--text2); background:#fff;
  }
  .pill-m { border-color:rgba(217,119,6,.3);  color:#D97706; background:rgba(217,119,6,.07); }
  .pill-p { border-color:rgba(37,99,235,.3);  color:#2563EB; background:rgba(37,99,235,.07); }
  .pill-c { border-color:rgba(22,163,74,.3);  color:#16A34A; background:rgba(22,163,74,.07); }

  @media(max-width:440px) { .card { padding:1.25rem 1.1rem; } }
</style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-logo">EAPCET<span class="brand-badge">2026</span></div>
    <div class="brand-sub">AP Engineering Entrance — Study Planner</div>
  </div>

  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Sign Up</button>
    </div>

    <div id="err-msg" class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <!-- LOGIN FORM -->
    <form id="form-login" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="l-email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="l-pass" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn" id="btn-login">Sign In →</button>
    </form>

    <!-- REGISTER FORM -->
    <form id="form-register" style="display:none" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="r-name" placeholder="Your name" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="r-email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label>Password <span style="color:var(--text3);font-weight:400">(min 6 chars)</span></label>
        <input type="password" id="r-pass" placeholder="Create a password" required>
      </div>
      <button type="submit" class="btn" id="btn-register">Create Account →</button>
    </form>
  </div>

  <div class="info-pills">
    <span class="pill pill-m">📐 Math: 80 Qs</span>
    <span class="pill pill-p">⚡ Physics: 40 Qs</span>
    <span class="pill pill-c">🧪 Chemistry: 40 Qs</span>
  </div>
</div>

<script>
  // If already logged in, go to app
  if (localStorage.getItem('eapcet-token')) {
    window.location.href = '/eapcet-study-app.html';
  }

  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tab-login').classList.toggle('active', isLogin);
    document.getElementById('tab-register').classList.toggle('active', !isLogin);
    document.getElementById('form-login').style.display = isLogin ? '' : 'none';
    document.getElementById('form-register').style.display = isLogin ? 'none' : '';
    clearMessages();
  }

  function showError(msg) {
    const el = document.getElementById('err-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('success-msg').style.display = 'none';
  }
  function showSuccess(msg) {
    const el = document.getElementById('success-msg');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('err-msg').style.display = 'none';
  }
  function clearMessages() {
    document.getElementById('err-msg').style.display = 'none';
    document.getElementById('success-msg').style.display = 'none';
  }

  async function handleLogin(e) {
    e.preventDefault();
    clearMessages();
    const btn = document.getElementById('btn-login');
    btn.disabled = true; btn.textContent = 'Signing in…';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('l-email').value,
          password: document.getElementById('l-pass').value
        })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Login failed'); return; }
      localStorage.setItem('eapcet-token', data.token);
      localStorage.setItem('eapcet-user', JSON.stringify(data.user));
      showSuccess('Welcome back, ' + data.user.username + '! Redirecting…');
      setTimeout(() => window.location.href = '/eapcet-study-app.html', 800);
    } catch (err) {
      showError('Could not connect to server. Is it running?');
    } finally {
      btn.disabled = false; btn.textContent = 'Sign In →';
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    clearMessages();
    const btn = document.getElementById('btn-register');
    btn.disabled = true; btn.textContent = 'Creating account…';
    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('r-name').value,
          email: document.getElementById('r-email').value,
          password: document.getElementById('r-pass').value
        })
      });
      const data = await res.json();
      if (!res.ok) { showError(data.error || 'Registration failed'); return; }
      localStorage.setItem('eapcet-token', data.token);
      localStorage.setItem('eapcet-user', JSON.stringify(data.user));
      showSuccess('Account created! Welcome, ' + data.user.username + '! Redirecting…');
      setTimeout(() => window.location.href = '/eapcet-study-app.html', 800);
    } catch (err) {
      showError('Could not connect to server. Is it running?');
    } finally {
      btn.disabled = false; btn.textContent = 'Create Account →';
    }
  }
</script>
</body>
</html>
